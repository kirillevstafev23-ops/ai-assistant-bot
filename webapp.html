<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Assistant</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>

        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 180px;
            border-radius: 12px;
            border: none;
            padding: 15px;
            margin-top: 20px;
            font-size: 16px;
        }

        button {
            width: 100%;
            height: 55px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

    </style>
</head>
<body>

    <h1>🚀 AI Assistant</h1>

    <textarea
        id="prompt"
        placeholder="Напиши сообщение..."
    ></textarea>

    <button onclick="sendMessage()">
        Отправить
    </button>

    <script>

        Telegram.WebApp.ready();

        function sendMessage() {

            let text = document.getElementById(
                "prompt"
            ).value;

            Telegram.WebApp.sendData(text);

            alert("Сообщение отправлено!");
        }

    </script>

</body>
</html>
