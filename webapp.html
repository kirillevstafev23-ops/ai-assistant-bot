<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>AI Assistant</title>

    <style>

        body {

            background: #0f172a;
            color: white;
            font-family: Arial;
            margin: 0;
            padding: 20px;
        }

        h1 {

            text-align: center;
            margin-bottom: 30px;
        }

        .grid {

            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {

            background: #1e293b;
            color: white;
            border: none;
            padding: 20px;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {

            background: #334155;
        }

    </style>
</head>

<body>

    <h1>🚀 AI Assistant</h1>

    <div class="grid">

        <button onclick="sendData('ai_chat')">
            🧠 AI Chat
        </button>

        <button onclick="sendData('image')">
            🎨 Картинки
        </button>

        <button onclick="sendData('docs')">
            📄 Документы
        </button>

        <button onclick="sendData('internet')">
            🌐 Интернет
        </button>

    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>

        let tg = window.Telegram.WebApp;

        tg.expand();

        function sendData(data) {

            tg.sendData(data);
        }

    </script>

</body>
</html>
